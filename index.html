<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h2>📌 Smart Leads Trackerr</h2>

        <input
            id="input-ele"
            type="text"
            placeholder="Paste a URL or type something..."
        >

        <div class="buttons">

            <button id="input-btn">
                💾 SAVE INPUT
            </button>

            <button id="tab-btn">
                🌐 SAVE TAB
            </button>

            <div class="tooltip">

                <button id="clear-btn">
                    🗑 DELETE ALL
                </button>

                <span class="tooltip-text">
                    Double-click to delete
                </span>

            </div>

        </div>

        <ul id="ul-ele"></ul>

    </div>

    <script src="script.js"></script>

</body>

</html>
