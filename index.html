<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Leads Tracker</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <header class="header">
        <h1>📌 Smart Leads Tracker</h1>

        <p class="subtitle">Save, organize and manage your favorite links.</p>

        <div id="counter-ele" class="counter">📚 Saved Links: 0</div>
      </header>

      <div class="input-section">
        <input
          id="input-ele"
          type="text"
          placeholder="Paste a URL or type something..."
        />

        <input id="search-ele" type="text" placeholder="🔍 Search links..." />
      </div>

      <div class="buttons">
        <button id="input-btn">💾 Save Input</button>

        <button id="tab-btn">🌐 Save Tab</button>

        <button id="sort-btn">🔤 Sort</button>

        <button id="export-btn">📤 Export</button>

        <button id="import-btn">📥 Import</button>

        <button id="theme-btn">🌙 Dark Mode</button>

        <div class="tooltip">
          <button id="clear-btn">🗑 Delete All</button>

          <span class="tooltip-text">   Double-click to delete </span>
        </div>
      </div>

      <input type="file" id="import-file" accept=".json" hidden />

      <ul id="ul-ele"></ul>
    </div>

    <div id="toast"></div>

    <script src="script.js"></script>
  </body>
</html>
